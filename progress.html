<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f6fb;
}

/* Navbar */

.navbar{
height:60px;
background:linear-gradient(90deg,#6C5CE7,#5A4BD8);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
font-size:20px;
}

/* Sidebar */

.sidebar{
position:fixed;
top:60px;
left:0;
width:220px;
height:100%;
background:#2D3436;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:15px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#636e72;
}

/* Main */

.main{
margin-left:220px;
margin-top:60px;
padding:30px;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
color:#6C5CE7;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid #ddd;
}

th{
background:linear-gradient(90deg,#6C5CE7,#5A4BD8);
color:white;
}

button{
padding:6px 12px;
border:none;
background:#00B894;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#019875;
}

</style>
</head>
