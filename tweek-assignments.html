<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Assignment Panel</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  margin: 0;
}

header {
  background: #1e2a38;
  color: white;
  padding: 15px;
  text-align: center;
}

.controls {
  text-align: center;
  margin: 20px;
}

select {
  padding: 10px;
  border-radius: 8px;
}

.container {
  width: 80%;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin: 15px 0;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  justify-content: space-between;
}

.type {
  padding: 5px 10px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
}

.daily { background: green; }
.weekly { background: orange; }
.monthly { background: red; }

.status {
  font-weight: bold;
}

.pending { color: orange; }
.approved { color: green; }
.rejected { color: red; }

.actions button {
  margin-right: 8px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.approve { background: green; color: white; }
.reject { background: red; color: white; }
.view { background: #007bff; color: white; }

</style>
</head>

<body>

<header>
  <h2>🧑‍🏫 Assignment Review Panel</h2>
</header>

<div class="controls">
  <select onchange="filterAssignments(this.value)">
    <option value="all">All</option>
    <option value="daily">Daily</option>
    <option value="weekly">Weekly</option>
    <option value="monthly">Monthly</option>
  </select>
</div>

<div class="container" id="list"></div>

<script>

// UNIQUE ID BASED DATA
let submissions = [
  {id:1, student:"Rahul", title:"Math Practice", type:"daily", status:"pending"},
  {id:2, student:"Ananya", title:"Essay Writing", type:"daily", status:"pending"},
  {id:3, student:"Ravi", title:"Science Model", type:"weekly", status:"pending"},
  {id:4, student:"Sneha", title:"History Notes", type:"weekly", status:"approved"},
  {id:5, student:"Amit", title:"Final Revision", type:"monthly", status:"pending"}
];

// DISPLAY FUNCTION
function render(data) {
  let html = "";

  data.forEach(item => {
    html += `
      <div class="card">
        <div class="top">
          <span class="type ${item.type}">${item.type.toUpperCase()}</span>
          <span class="status ${item.status}">${item.status.toUpperCase()}</span>
        </div>

        <h3>${item.title}</h3>
        <p><b>Student:</b> ${item.student}</p>

        <div class="actions">
          ${
            item.status === "pending"
            ? `
            <button class="approve" onclick="updateStatus(${item.id}, 'approved')">Approve</button>
            <button class="reject" onclick="updateStatus(${item.id}, 'rejected')">Reject</button>
            `
            : ""
          }

          <button class="view" onclick="viewAssignment('${item.title}')">View</button>
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// FILTER
function filterAssignments(type) {
  if (type === "all") {
    render(submissions);
  } else {
    const filtered = submissions.filter(s => s.type === type);
    render(filtered);
  }
}

// UPDATE STATUS (SAFE)
function updateStatus(id, newStatus) {
  submissions = submissions.map(item => {
    if (item.id === id) {
      item.status = newStatus;
    }
    return item;
  });

  alert("Updated successfully ✅");
  filterAssignments("all");
}

// VIEW (DEMO)
function viewAssignment(title) {
  alert("Opening: " + title);
}

// INITIAL LOAD
render(submissions);

</script>

</body>
</html>
